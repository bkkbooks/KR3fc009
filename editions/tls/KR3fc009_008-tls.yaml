body:
  text: 以下所掌亦如之唐廢筭學顯慶元年復置三年又廢以博士以下隸太史局龍朔二年復有學生十人典學二人東都學生二人崇寧國子監筭學令諸學生習九章周髀義及筭問謂假設疑數兼通海島孫子五曹張丘建夏侯陽筭法幷曆筭三式天文書諸試以通粗併計兩粗當一通筭義筭問以所對優長通及三分以上爲合格曆筭卽筭前一季五星昏曉宿度或日月交食仍筭定時刻早晚及所食分數三式卽射覆及豫占三日陰陽風雨天文卽豫定一月或一季分野災祥並以依經備草合問爲通崇寧國子監筭學格官屬博士四員內二員分講九章周髀二員分習曆筭三式天文
