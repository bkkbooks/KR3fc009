body:
  text: 以下所掌亦如之唐廢算學顯慶元年復置三年又廢以博士以下隸太史局龍朔二年復有學生十人典學二人東都學生二人崇寧國子監算學令諸學生習九章周髀義及算問謂假設疑數兼通海島孫子五曹張丘建夏侯陽算法並曆算三式天文書諸試以通粗併計兩粗當一通算義算問以所對優長通及三分以上為合格曆算即算前一季五星昏曉宿度或日月交食仍算定時刻早晚及所食分數三式即射覆及豫占三日陰陽風雨天文即豫定一月或一季分野災祥並以依經備草合問為通崇寧國子監算學格官屬博士四員內二員分講九章周髀二員分習曆算三式天文
