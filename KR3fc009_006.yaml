body:
  text: 歲綴術四歲緝古三歲記遺三等數皆兼習之凡筭學錄大義本條爲問答明數造術詳明術理然後爲通試九章三條海島孫子五曹張丘建夏侯陽周髀五經筭各一條十通六記遺三等數帖讀十得九爲第試綴術緝古錄大義爲問答者明數造術詳明術理無注者合數造術不失義理然後爲通綴術七條緝古三條十通六記遺三等數帖讀十得九爲第落經者雖通六不第高宗龍朔三年以筭學隸祕閣唐書百官志國子監祭酒司業掌儒學訓導之政揔國子太學廣文四門律書筭凡七學筭學博士二人從九品下助敎一人掌敎八品以下及庶人子爲生者二分其經以爲業九章海島孫子五曹張丘建夏侯陽周髀五經筭綴術緝古爲顓業兼習記遺三等數凡六學束修之禮督課試擧皆如國子學助敎
