body:
  text: 歲綴術四歲緝古三歲記遺三等數皆兼習之凡算學録大義本條為問答明數造術詳明術理然後為通試九章三條海島孫子五曹張丘建夏侯陽周髀五經算各一條十通六記遺三等數帖讀十得九為第試綴術緝古録大義為問答者明數造術詳明術理無注者合數造術不失義理然後為通綴術七條緝古三條十通六記遺三等數帖讀十得九為第落經者雖通六不第高宗龍朔三年以算學隸祕閣唐書百官志國子監祭酒司業掌儒學訓導之政揔國子太學廣文四門律書算凡七學算學博士二人從九品下助教一人掌教八品以下及庶人子為生者二分其經以為業九章海島孫子五曹張丘建夏侯陽周髀五經算綴術緝古為顓業兼習記遺三等數凡六學束修之禮督課試舉皆如國子學助教
