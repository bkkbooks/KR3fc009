body:
  text: 學正舉行學規一員職事人學録佐學正糾不如規者一人學諭以所習業傳諭諸生一人司計掌飲食支用一人直學掌文籍及謹學生出入二人司書掌書籍一人齋長紏齋中不如規者齋諭掌佐齋長道諭諸生齋各一人學生上舍三十人內舍八十人外舍一百五十人補試命官公試同九章義三道算問二道私試孟月補上內舍第一埸九章周髀義三道
