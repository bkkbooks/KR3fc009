body:
  text: 分少廣商功均輸方程贏不足旁要今有重差夕桀句股也賈公彥疏釋曰九數者方田巳下皆依九章筭術而言云今有重差夕桀句股也者此漢法增之馬氏注以爲今有重差夕桀夕桀亦是筭術之名與鄭異案今九章以句股替旁要則旁要句服之類也漢書紀高祖不修文學而性明達好謀能聽天下旣定命蕭何次律令韓信申軍法張蒼定章程顏師古注如淳云章歷數之章術也程者權衡丈尺斗斛之平法也師古曰程法式也叔孫通制禮儀陸賈造新語規摹弘遠也唐書選擧志唐制取士之科多因隋舊其科目有秀才有明經有俊士有進士有明字有明筭有三史有開元禮有道擧有童子凡學六皆隸於國子監筭學生三十員以八品以下子及庶人之通其學者爲之凡筭學孫子五曹共限一歲九章海島共三歲張丘建夏侯陽各一歲周髀五經筭共一
