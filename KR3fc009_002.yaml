body:
  text: 晉書律曆志黃帝紀三綱而闡書契乃使羲和占日常儀占月車區占星氣伶倫造律吕大撓造甲子隸首作筭數容成總斯六術考定氣象建五行察發斂起消息正閏餘述而著焉謂之調歷漢書律曆志一曰備數二曰和聲三曰審度四曰嘉量五曰權衡數者一十百千萬也所以筭數事物順性命之理也其筭法用竹徑一分長六寸二百七十一枚而成六觚爲一握度長短者不失毫氂量多少者不失圭撮權輕重者不失絫紀於一協於十長於百大於千衍於萬其法在筭術宣于天下小學是則職在太史羲和掌之周禮地官之屬保氏養國子以道乃敎之六藝一曰五禮二曰六樂三曰五射四曰五馭六曰九數鄭氏注鄭司農云九數方田粟米差
